<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>VTR - Start Scan</title>
</head>
<body>
  <h1>Start Nmap Scan</h1>
  <form action="{{ url_for('main.scan_endpoint') }}" method="post">
    <label for="target">Target (IP, CIDR, or hostname):</label><br/>
    <input type="text" id="target" name="target" placeholder="127.0.0.1 or 192.168.1.0/24" required style="width:300px"/><br/><br/>
    <button type="submit">Run Scan</button>
  </form>
  <p>Note: Scan runs synchronously and will block until completion. For production use, run scans asynchronously.</p>
</body>
</html>
