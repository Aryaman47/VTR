<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>VTR Sign In</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

    :root {
      --bg-main: #071620;
      --bg-accent: #104160;
      --panel: #ffffff;
      --text-main: #1a2933;
      --text-soft: #60707d;
      --brand: #0f8395;
      --brand-strong: #0a6674;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      font-family: "IBM Plex Sans", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 12% 8%, rgba(14, 155, 174, 0.24), transparent 33%),
        radial-gradient(circle at 88% 90%, rgba(230, 122, 34, 0.18), transparent 35%),
        linear-gradient(150deg, var(--bg-main), var(--bg-accent));
    }

    .card {
      width: min(460px, 100%);
      border: 1px solid #d7e5ef;
      background: var(--panel);
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 14px 36px rgba(2, 14, 20, 0.28);
      animation: appear 420ms ease;
    }

    h1 {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      letter-spacing: 0.35px;
      font-size: 1.8rem;
    }

    .sub {
      margin-top: 6px;
      color: var(--text-soft);
      font-size: 0.95rem;
      margin-bottom: 14px;
    }

    label { display: block; margin-bottom: 6px; font-weight: 600; }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 11px;
      margin-bottom: 12px;
      border: 1px solid #c7d8e3;
      border-radius: 10px;
      font-size: 0.95rem;
    }

    button {
      width: 100%;
      border: 0;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-strong));
      padding: 11px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }

    .flash { padding: 10px 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid transparent; }
    .flash-success { background: #dff1e9; color: #14543b; border-color: #b9dec9; }
    .flash-danger { background: #fce6e9; color: #842733; border-color: #f3c2ca; }

    @keyframes appear {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>VTR Access Portal</h1>
    <p class="sub">Authenticate to launch scans and manage vulnerability findings.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('main.login') }}" method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
      <input type="hidden" name="next" value="{{ request.args.get('next', '') }}" />

      <label for="username">Username</label>
      <input id="username" name="username" type="text" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required />

      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
